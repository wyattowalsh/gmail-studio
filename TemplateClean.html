<!DOCTYPE html>
<html>
<head>
  <base target="_top">
</head>
<body style="margin: 0; padding: 0; background-color: #f3efe7; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%;">
  <div style="display: none; max-height: 0; overflow: hidden; opacity: 0; mso-hide: all; color: transparent;">
    <?= preview_text || headline || '' ?>&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;
  </div>

  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse: collapse; background-color: #f3efe7;">
    <tr>
      <td align="center" style="padding: 34px 14px;">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse: collapse; max-width: 620px; background-color: #fffdf8; border: 1px solid #ddd4c8;">
          <tr>
            <td style="height: 4px; line-height: 4px; font-size: 4px; background-color: #7f8d7d;">&nbsp;</td>
          </tr>
          <tr>
            <td style="padding: 34px 32px 30px 32px; font-family: Arial, Helvetica, sans-serif; color: #17212b;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse: collapse;">
                <tr>
                  <td style="padding: 0 0 18px 0;">
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse: collapse;">
                      <tr>
                        <td style="font-size: 10px; line-height: 12px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: #6d776f; white-space: nowrap;">
                          Clean note
                        </td>
                        <td style="padding-left: 12px; width: 100%;">
                          <div style="height: 1px; line-height: 1px; font-size: 1px; background-color: #e3dbcf;">&nbsp;</div>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>

                <? if (first_name) { ?>
                <tr>
                  <td style="padding: 0 0 12px 0; font-size: 15px; line-height: 23px; color: #51606d;">
                    Hi <?= first_name ?>,
                  </td>
                </tr>
                <? } ?>

                <? if (headline) { ?>
                <tr>
                  <td style="padding: 0 0 16px 0;">
                    <h1 style="margin: 0; font-size: 30px; line-height: 1.18; font-weight: 700; letter-spacing: -0.04em; color: #17212b;">
                      <?= headline ?>
                    </h1>
                  </td>
                </tr>
                <? } ?>

                <? if (body_html) { ?>
                <tr>
                  <td style="font-size: 16px; line-height: 29px; color: #30404d; word-break: break-word;">
                    <?!= body_html ?>
                  </td>
                </tr>
                <? } ?>

                <? if (cta_url) { ?>
                <tr>
                  <td style="padding: 28px 0 0 0;">
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse: collapse;">
                      <tr>
                        <td style="border: 1px solid #d6cec0; background-color: #eef3ed;">
                          <a href="<?= cta_url ?>" style="display: inline-block; padding: 12px 18px; font-size: 14px; line-height: 18px; font-weight: 700; color: #31483e; text-decoration: none;">
                            <?= cta_text || 'Open details' ?>
                          </a>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
                <? } ?>

                <? if (include_signature) { ?>
                <tr>
                  <td style="height: 28px; line-height: 28px; font-size: 28px;">&nbsp;</td>
                </tr>
                <tr>
                  <td>
                    <?!= include('Signature') ?>
                  </td>
                </tr>
                <? } ?>
              </table>
            </td>
          </tr>

          <? if (footer_note || footer_company || footer_address) { ?>
          <tr>
            <td style="padding: 0 32px 28px 32px;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse: collapse; border-top: 1px solid #e7dfd2;">
                <tr>
                  <td style="padding-top: 14px; font-family: Arial, Helvetica, sans-serif; font-size: 12px; line-height: 19px; color: #6a757f;">
                    <? if (footer_note) { ?>
                    <div style="margin: 0 0 6px 0;">
                      <?= footer_note ?>
                    </div>
                    <? } ?>
                    <? if (footer_company) { ?>
                    <div style="margin: 0 0 2px 0; color: #4a5763; font-weight: 700; letter-spacing: 0.2px;">
                      <?= footer_company ?>
                    </div>
                    <? } ?>
                    <? if (footer_address) { ?>
                    <div style="margin: 0;">
                      <?= footer_address ?>
                    </div>
                    <? } ?>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <? } ?>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
