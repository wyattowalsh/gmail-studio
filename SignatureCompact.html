<table
  role="presentation"
  cellpadding="0"
  cellspacing="0"
  border="0"
  style="border-collapse: collapse; width: 100%; max-width: 520px; font-family: Arial, Helvetica, sans-serif; color: #1f2937;"
>
  <tr>
    <td style="padding: 0;">
      <div
        style="font-family: 'SFMono-Regular', 'SF Mono', Menlo, Monaco, Consolas, 'Liberation Mono', monospace; font-size: 20px; line-height: 1.1; font-weight: 700; letter-spacing: -0.04em; color: #111827;"
      >
        <?= signature_name || sender_name || '' ?>
      </div>
      <? if (signature_note) { ?>
      <div style="margin-top: 6px; font-size: 12px; line-height: 1.5; color: #5f6b76;">
        <?= signature_note ?>
      </div>
      <? } ?>
      <div style="margin: 10px 0 8px 0; font-size: 11px; line-height: 1; letter-spacing: 0.08em; color: #7c8995;">
        ━━ ◈ ━━ ◇ ━━ ◈ ━━
      </div>
      <div style="font-size: 13px; line-height: 1.65; color: #1f2937;">
        <? if (signature_email) { ?>
        <div>
          <a href="mailto:<?= signature_email ?>" style="color: #1f2937; text-decoration: underline;"><?= signature_email ?></a>
        </div>
        <? } ?>
        <? if (signature_website_href && signature_website_label) { ?>
        <div>
          <a href="<?= signature_website_href ?>" style="color: #1f2937; text-decoration: underline;"><?= signature_website_label ?></a>
        </div>
        <? } ?>
      </div>
    </td>
  </tr>
</table>
