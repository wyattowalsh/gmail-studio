<!DOCTYPE html>
<html>
<head>
  <base target="_top">
</head>
<body style="margin: 0; padding: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background-color: #f3f5f7; color: #0f1720;">
  <div style="display: none; max-height: 0; overflow: hidden; opacity: 0; mso-hide: all; color: transparent;">
    <?= preview_text || headline || '' ?>&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;
  </div>

  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse: collapse; background-color: #f3f5f7;">
    <tr>
      <td align="center" style="padding: 40px 18px;">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse: collapse; width: 100%; max-width: 620px; margin: 0 auto;">
          <tr>
            <td style="border: 1px solid #dde3ea; background-color: #ffffff; padding: 38px 38px 34px 38px; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #0f1720;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse: collapse;">
                <tr>
                  <td style="padding: 0 0 20px 0;">
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse: collapse;">
                      <tr>
                        <td style="font-size: 10px; line-height: 12px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: #7b8794; white-space: nowrap;">
                          Quiet note
                        </td>
                        <td style="padding-left: 12px; width: 100%;">
                          <div style="height: 1px; line-height: 1px; font-size: 1px; background-color: #dbe2ea;">&nbsp;</div>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
                <? if (first_name) { ?>
                <tr>
                  <td style="padding: 0 0 14px 0; font-size: 15px; line-height: 24px; color: #526070;">
                    Hi <?= first_name ?>,
                  </td>
                </tr>
                <? } ?>

                <? if (headline) { ?>
                <tr>
                  <td style="padding: 0 0 18px 0;">
                    <h1 style="margin: 0; font-size: 31px; line-height: 1.18; font-weight: 700; letter-spacing: -0.04em; color: #0f1720;">
                      <?= headline ?>
                    </h1>
                  </td>
                </tr>
                <? } ?>

                <? if (body_html) { ?>
                <tr>
                  <td style="font-size: 16px; line-height: 29px; color: #26313d;">
                    <?!= body_html ?>
                  </td>
                </tr>
                <? } ?>

                <? if (cta_url) { ?>
                <tr>
                  <td style="padding: 32px 0 0 0;">
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse: collapse;">
                      <tr>
                        <td style="padding: 0 0 10px 0; font-size: 10px; line-height: 12px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #7b8794;">
                          Next step
                        </td>
                      </tr>
                      <tr>
                        <td>
                          <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse: collapse;">
                            <tr>
                              <td style="border: 1px solid #d8e0e8; background-color: #f8fafc; padding: 11px 14px;">
                                <a href="<?= cta_url ?>" style="display: inline-block; font-size: 14px; line-height: 18px; font-weight: 600; color: #0f1720; text-decoration: none;">
                                  <span style="color: #667588; font-weight: 500;">Open</span>
                                  <span style="color: #c4ccd6;">&nbsp;/&nbsp;</span>
                                  <?= cta_text || 'Take a look' ?> &rarr;
                                </a>
                              </td>
                            </tr>
                          </table>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
                <? } ?>

                <? if (include_signature) { ?>
                <tr>
                  <td style="padding: 30px 0 0 0;">
                    <?!= include('Signature') ?>
                  </td>
                </tr>
                <? } ?>

                <? if (footer_note || footer_company || footer_address) { ?>
                <tr>
                  <td style="padding: 28px 0 0 0;">
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse: collapse; border-top: 1px solid #e2e8f0;">
                      <tr>
                        <td style="padding-top: 16px; font-size: 12px; line-height: 20px; color: #6a7684;">
                          <? if (footer_note) { ?>
                          <div style="margin: 0 0 6px 0;">
                            <?= footer_note ?>
                          </div>
                          <? } ?>
                          <? if (footer_company) { ?>
                          <div style="margin: 0 0 2px 0; font-weight: 600; color: #4f5c6b;">
                            <?= footer_company ?>
                          </div>
                          <? } ?>
                          <? if (footer_address) { ?>
                          <div style="margin: 0;">
                            <?= footer_address ?>
                          </div>
                          <? } ?>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
                <? } ?>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
