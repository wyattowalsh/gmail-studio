<!DOCTYPE html>
<html>
<head>
  <base target="_top">
</head>
<body style="margin: 0; padding: 0; background-color: #f7efe4; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%;">
  <div style="display: none; max-height: 0; overflow: hidden; opacity: 0; mso-hide: all; color: transparent;">
    <?= preview_text || headline || '' ?>&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;
  </div>

  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse: collapse; background-color: #f7efe4;">
    <tr>
      <td align="center" style="padding: 30px 12px 36px 12px;">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse: collapse; max-width: 640px; background-color: #fffaf3; border: 1px solid #e1d4c3;">
          <tr>
            <td style="height: 6px; line-height: 6px; font-size: 6px; background: linear-gradient(90deg, #9e6b4f 0%, #c59d77 50%, #8a9b7d 100%);">&nbsp;</td>
          </tr>
          <tr>
            <td style="padding: 28px 30px 24px 30px; font-family: Georgia, 'Times New Roman', serif; color: #2a2119;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse: collapse; margin: 0 0 18px 0;">
                <tr>
                  <td style="padding: 6px 10px; font-family: Arial, Helvetica, sans-serif; font-size: 10px; line-height: 12px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: #7a634f; border: 1px solid #e1d4c3; background-color: #fbf5ee;">
                    Personal note
                  </td>
                </tr>
              </table>

              <? if (first_name) { ?>
              <div style="margin: 0 0 10px 0; font-family: Arial, Helvetica, sans-serif; font-size: 16px; line-height: 25px; color: #5f564d;">
                Hi <?= first_name ?>,
              </div>
              <? } ?>

              <? if (headline) { ?>
              <h1 style="margin: 0 0 14px 0; font-size: 30px; line-height: 36px; font-weight: 700; letter-spacing: -0.04em; color: #201914;">
                <?= headline ?>
              </h1>
              <? } ?>

              <div style="margin: 0; font-size: 18px; line-height: 31px; color: #3f372f;">
                <?!= body_html || '' ?>
              </div>

              <? if (cta_url) { ?>
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse: collapse; margin-top: 24px;">
                <tr>
                  <td style="border: 1px solid #b98f72; background-color: #f7ebe1;">
                    <a href="<?= cta_url ?>" style="display: inline-block; padding: 12px 18px; font-family: Arial, Helvetica, sans-serif; font-size: 13px; line-height: 17px; font-weight: 700; color: #6f4c39; text-decoration: none; letter-spacing: 0.04em;">
                      <?= cta_text || 'Take a look' ?>
                    </a>
                  </td>
                </tr>
              </table>
              <? } ?>

              <? if (include_signature) { ?>
              <div style="height: 22px; line-height: 22px; font-size: 22px;">&nbsp;</div>
              <?!= include('Signature') ?>
              <? } ?>
            </td>
          </tr>

          <? if (footer_note || footer_company || footer_address) { ?>
          <tr>
            <td style="padding: 0 30px 22px 30px; font-family: Arial, Helvetica, sans-serif;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse: collapse; border-top: 1px solid #ece0d2;">
                <tr>
                  <td style="padding-top: 14px; font-size: 12px; line-height: 18px; color: #7c6f64;">
                    <? if (footer_note) { ?>
                    <div style="margin: 0 0 4px 0;"><?= footer_note ?></div>
                    <? } ?>
                    <? if (footer_company) { ?>
                    <div style="margin: 0 0 2px 0; color: #66584d; font-weight: 600;"><?= footer_company ?></div>
                    <? } ?>
                    <? if (footer_address) { ?>
                    <div style="margin: 0;"><?= footer_address ?></div>
                    <? } ?>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <? } ?>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
