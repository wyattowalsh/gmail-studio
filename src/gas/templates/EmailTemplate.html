<!doctype html>
<html>
  <head>
    <base target="_top">
  </head>
  <body style="margin: 0; padding: 0; background-color: #f4efe7; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%;">
    <div style="display: none; max-height: 0; max-width: 0; overflow: hidden; opacity: 0; mso-hide: all; color: transparent; font-size: 1px; line-height: 1px;">
      <?= preview_text || headline || '' ?>
    </div>

    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse: collapse; background-color: #f4efe7;">
      <tr>
        <td align="center" style="padding: 30px 12px;">
          <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse: collapse; max-width: 620px; background-color: #fffdf9; border: 1px solid #ddd4c8;">
            <tr>
              <td style="height: 4px; line-height: 4px; font-size: 4px; background-color: #607366;">&nbsp;</td>
            </tr>

            <tr>
              <td style="padding: 34px 30px 28px 30px; font-family: Arial, Helvetica, sans-serif; color: #1f2933;">
                <? if (first_name) { ?>
                <div style="margin: 0 0 12px 0; font-size: 14px; line-height: 22px; color: #5f6b75;">
                  Hi <?= first_name ?>,
                </div>
                <? } ?>

                <? if (headline) { ?>
                <h1 style="margin: 0 0 16px 0; font-size: 28px; line-height: 34px; font-weight: 700; letter-spacing: -0.03em; color: #17212b;">
                  <?= headline ?>
                </h1>
                <? } ?>

                <? if (body_html) { ?>
                <div style="margin: 0; font-size: 16px; line-height: 28px; color: #35424f; word-break: break-word;">
                  <?!= body_html ?>
                </div>
                <? } ?>

                <? if (cta_url) { ?>
                <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse: collapse; margin-top: 26px;">
                  <tr>
                    <td style="background-color: #445c50; text-align: center;">
                      <a href="<?= cta_url ?>" style="display: inline-block; padding: 12px 20px; font-size: 14px; line-height: 20px; font-weight: 700; color: #ffffff; text-decoration: none; letter-spacing: 0.2px;">
                        <?= cta_text || 'Take a look' ?>
                      </a>
                    </td>
                  </tr>
                </table>
                <? } ?>

                <? if (include_signature) { ?>
                <div style="height: 24px; line-height: 24px; font-size: 24px;">&nbsp;</div>
                <?!= include('Signature') ?>
                <? } ?>
              </td>
            </tr>

            <? if (footer_note || footer_company || footer_address) { ?>
            <tr>
              <td style="padding: 18px 30px 22px 30px; font-family: Arial, Helvetica, sans-serif; font-size: 12px; line-height: 18px; color: #66727b; border-top: 1px solid #e7dfd2; background-color: #faf7f1;">
                <? if (footer_note) { ?>
                <div style="margin: 0 0 8px 0; color: #6d776f;">
                  <?= footer_note ?>
                </div>
                <? } ?>
                <? if (footer_company) { ?>
                <div style="margin: 0 0 4px 0; color: #44504f; font-weight: 700; letter-spacing: 0.2px;">
                  <?= footer_company ?>
                </div>
                <? } ?>
                <? if (footer_address) { ?>
                <div style="margin: 0; color: #6d776f;">
                  <?= footer_address ?>
                </div>
                <? } ?>
              </td>
            </tr>
            <? } ?>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
